name: Build & Release

# Pushing a version tag (v1.0.1, v2.0.0, ...) builds the Windows installer
# and attaches it to a GitHub Release for that tag.
# Manual runs (workflow_dispatch) just build and upload the exe as an artifact.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist -- --publish never

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NestEgg-Setup
          path: dist/*.exe

      - name: Publish release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
