<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>NestEgg</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="logo">
        <svg viewBox="0 0 32 32" class="logo-mark" aria-hidden="true">
          <defs>
            <linearGradient id="eggGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#3987e5"/>
              <stop offset="1" stop-color="#1baf7a"/>
            </linearGradient>
          </defs>
          <path d="M16 3C10.5 3 6 11.5 6 18.5 6 24.3 10.5 29 16 29s10-4.7 10-10.5C26 11.5 21.5 3 16 3z" fill="url(#eggGrad)"/>
          <path d="M11 20.5l3.2-3.6 2.6 2.2 4.4-5.1" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="logo-text">
          <span class="logo-name">NestEgg</span>
          <span class="logo-sub">Budget &amp; Retirement</span>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="theme-toggle" title="Toggle light / dark theme"></button>
        <span id="app-version" class="version"></span>
      </div>
    </aside>
    <main id="main">
      <div id="view" tabindex="-1"></div>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="vendor/chart.umd.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/demo.js"></script>
  <script src="js/components.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/engines.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/accounts.js"></script>
  <script src="js/views/transactions.js"></script>
  <script src="js/views/budget.js"></script>
  <script src="js/views/recurring.js"></script>
  <script src="js/views/subscriptions.js"></script>
  <script src="js/views/goals.js"></script>
  <script src="js/views/debt.js"></script>
  <script src="js/views/retirement.js"></script>
  <script src="js/views/reports.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
